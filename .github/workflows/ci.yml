name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data:
    name: Data pipeline & export tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Test export invariants (committed exports)
        run: pytest -q

      - name: Regenerate exports and run the strict integrity audit
        run: python scripts/export/refresh_all_exports.py

  site:
    name: Site typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Also the safety net for the deploy: a missing imported data file (e.g.
      # an uncommitted @data/*.json) fails the build here instead of silently
      # breaking the Netlify deploy.
      - name: Build
        run: pnpm build
